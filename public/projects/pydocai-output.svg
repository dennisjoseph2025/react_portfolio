  <text x="600" y="100" font-family="monospace" font-size="12" fill="#FFFFFF" opacity="0.4" text-anchor="middle">README.md — PyDocAi</text>
  <rect x="60" y="130" width="1160" height="525" rx="8" fill="#0F0F0F"/>
  <text x="80" y="165" font-family="monospace" font-size="20" fill="#22C55E" font-weight="bold"># Project: django-rest-framework</text>
  <text x="80" y="195" font-family="monospace" font-size="13" fill="#FFFFFF" opacity="0.5">Generated on: June 3, 2026</text>
  <line x1="80" y1="210" x2="1200" y2="210" stroke="#FFFFFF" stroke-opacity="0.08"/>
  <text x="80" y="240" font-family="monospace" font-size="14" fill="#FFFFFF" opacity="0.8" font-weight="bold">## Overview</text>
  <text x="80" y="265" font-family="sans-serif" font-size="13" fill="#FFFFFF" opacity="0.6">Django REST Framework is a powerful and flexible toolkit for building Web APIs.</text>
  <text x="80" y="285" font-family="sans-serif" font-size="13" fill="#FFFFFF" opacity="0.6">It provides a set of reusable components that make it easy to build RESTful</text>
  <text x="80" y="305" font-family="sans-serif" font-size="13" fill="#FFFFFF" opacity="0.6">APIs with Django models and views.</text>
  <text x="80" y="340" font-family="monospace" font-size="14" fill="#FFFFFF" opacity="0.8" font-weight="bold">## Architecture</text>
  <rect x="80" y="355" width="160" height="60" rx="8" fill="#22C55E" opacity="0.15" stroke="#22C55E" stroke-width="1" stroke-opacity="0.3"/>
  <text x="115" y="385" font-family="monospace" font-size="11" fill="#22C55E">API Views</text>
  <rect x="270" y="355" width="160" height="60" rx="8" fill="#22C55E" opacity="0.15" stroke="#22C55E" stroke-width="1" stroke-opacity="0.3"/>
  <text x="295" y="385" font-family="monospace" font-size="11" fill="#22C55E">Serializers</text>
  <rect x="460" y="355" width="160" height="60" rx="8" fill="#22C55E" opacity="0.15" stroke="#22C55E" stroke-width="1" stroke-opacity="0.3"/>
  <text x="495" y="385" font-family="monospace" font-size="11" fill="#22C55E">Models</text>
  <line x1="240" y1="385" x2="270" y2="385" stroke="#FFFFFF" stroke-opacity="0.1"/>
  <line x1="430" y1="385" x2="460" y2="385" stroke="#FFFFFF" stroke-opacity="0.1"/>
  <text x="80" y="450" font-family="monospace" font-size="14" fill="#FFFFFF" opacity="0.8" font-weight="bold">## API Endpoints</text>
  <rect x="80" y="465" width="700" height="30" rx="4" fill="#FFFFFF" opacity="0.03"/>
  <text x="95" y="485" font-family="monospace" font-size="11" fill="#22C55E">GET</text>
  <text x="140" y="485" font-family="monospace" font-size="11" fill="#FFFFFF" opacity="0.5">/api/projects/</text>
  <text x="340" y="485" font-family="monospace" font-size="11" fill="#FFFFFF" opacity="0.3">List all projects</text>
  <rect x="80" y="500" width="700" height="30" rx="4" fill="#FFFFFF" opacity="0.03"/>
  <text x="95" y="520" font-family="monospace" font-size="11" fill="#22C55E">POST</text>
  <text x="140" y="520" font-family="monospace" font-size="11" fill="#FFFFFF" opacity="0.5">/api/projects/</text>
  <text x="340" y="520" font-family="monospace" font-size="11" fill="#FFFFFF" opacity="0.3">Create a new project</text>
  <text x="80" y="560" font-family="monospace" font-size="14" fill="#FFFFFF" opacity="0.8" font-weight="bold">## Requirements</text>
  <text x="95" y="585" font-family="monospace" font-size="11" fill="#FFFFFF" opacity="0.5">- Python 3.10+</text>
  <text x="95" y="605" font-family="monospace" font-size="11" fill="#FFFFFF" opacity="0.5">- Django 5.0+</text>
  <text x="95" y="625" font-family="monospace" font-size="11" fill="#FFFFFF" opacity="0.5">- PostgreSQL 16</text>
